name: "liftlab"
version: "0.1.0"
config-version: 2

profile: "liftlab"

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Default cutoff splitting each customer's pre-period (covariate) from the
# post-period (outcome). Overridden at runtime via --vars by `liftlab build`.
vars:
  cutoff_date: "2018-01-01"

models:
  liftlab:
    staging:
      +materialized: view
    marts:
      +materialized: table
